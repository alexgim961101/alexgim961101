name: Update Open Source Contributions

on:
  schedule:
    - cron: '0 0 * * 1'  # 매주 월요일 UTC 00:00
  workflow_dispatch:       # 수동 실행

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch merged PRs and update README
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 본인 레포가 아닌 곳에 머지된 PR 검색 (최신순 정렬)
          gh api "search/issues?q=author:alexgim961101+type:pr+is:merged+-user:alexgim961101&sort=updated&order=desc&per_page=100" \
            --jq '.items[] | "\(.repository_url | split("/") | .[-2:] | join("/"))|\(.title)|\(.html_url)"' \
            > /tmp/contributions.txt

          # 같은 레포의 PR을 한 행으로 그룹핑하여 테이블 생성
          python3 - <<'PYEOF' > /tmp/table.md
          import sys
          from collections import OrderedDict

          repos = OrderedDict()
          exclude = ("likelion-", "mooh2jj/", "mule-heo/")

          with open("/tmp/contributions.txt") as f:
              for line in f:
                  line = line.strip()
                  if not line:
                      continue
                  repo, title, url = line.split("|", 2)
                  if any(repo.startswith(e) for e in exclude):
                      continue
                  pr_num = url.rstrip("/").split("/")[-1]
                  pr_link = f"[#{pr_num}]({url})"
                  if repo not in repos:
                      repos[repo] = {"title": title, "prs": [pr_link]}
                  else:
                      repos[repo]["prs"].append(pr_link)

          print("| Project | Description | PR |")
          print("|:--------|:------------|:---|")
          for repo, info in repos.items():
              prs = " · ".join(info["prs"])
              print(f"| [{repo}](https://github.com/{repo}) | {info['title']} | {prs} |")
          PYEOF

          # README의 마커 사이 내용 교체
          awk '
            /<!-- CONTRIBUTIONS_START -->/{print; while((getline line < "/tmp/table.md") > 0) print line; skip=1; next}
            /<!-- CONTRIBUTIONS_END -->/{skip=0}
            !skip
          ' README.md > README.tmp && mv README.tmp README.md

      - name: Commit and push if changed
        run: |
          git diff --quiet && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs: auto-update open source contributions"
          git push
